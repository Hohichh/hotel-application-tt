# Тестовый профиль — H2 in-memory, изолированная БД для каждого теста
spring.datasource.url=jdbc:h2:mem:hotels_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Liquibase создаёт схему из основного changelog
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Порт — как в основном приложении
server.port=8092
logging.level.root=INFO
